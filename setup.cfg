# Linting/formatting: Ruff is the source of truth (see ruff.toml).
# Legacy [flake8] and [isort] sections removed to avoid confusion.

[tool:pytest]
DJANGO_SETTINGS_MODULE = config.settings_test

[coverage:run]
branch = True
source = 
    core
    users
    reception
    processing
    inventory
    portal
    labeling
    reporting
omit = 
    */migrations/*
    */tests*
    conftest.py
    manage.py
    config/*
    theme/*
    */management/commands/create_test_data.py
    */management/commands/setup_default_reports.py
    */management/commands/seed_plu.py
    reporting/utils.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    ^\s*if __name__ == ["']__main__["']:
    ^\s*class .*Protocol\):
    @(abc\.)?abstractmethod

show_missing = True
precision = 2

[coverage:html]
directory = htmlcov
