[flake8]
max-line-length = 120
exclude = 
    .git,
    .tox,
    migrations,
    __pycache__,
    htmlcov,
    staticfiles,
    media,
    theme,
    venv,
    .venv

ignore = 
    E501,  # Line too long (handled by max-line-length)
    W503,  # Line break before binary operator
    E203,  # Whitespace before ':'

per-file-ignores =
    */migrations/*:E501
    conftest.py:E501

[isort]
profile = black
line_length = 120
skip = migrations, .tox, htmlcov, staticfiles, media, theme, venv, .venv
known_django = django
known_first_party = core, users, reception, processing, inventory, portal, labeling, reporting
sections = FUTURE, STDLIB, DJANGO, THIRDPARTY, FIRSTPARTY, LOCALFOLDER
skip_glob = */migrations/*

[tool:pytest]
DJANGO_SETTINGS_MODULE = config.settings_test

[coverage:run]
branch = True
source = 
    core
    users
    reception
    processing
    inventory
    portal
    labeling
    reporting
omit = 
    */migrations/*
    */tests*
    conftest.py
    manage.py
    config/*
    theme/*
    */management/commands/create_test_data.py
    */management/commands/setup_default_reports.py
    */management/commands/seed_plu.py
    reporting/utils.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod

show_missing = True
precision = 2

[coverage:html]
directory = htmlcov
