{% extends 'base.html' %}

{% block title %}Logged Out - {{ block.super }}{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto text-center">
    <h2 class="text-3xl font-extrabold text-gray-900 mb-4">
      You have been successfully logged out.
    </h2>
    <p class="text-gray-600 mb-8">
        Thank you for using the Slaughterhouse Management System.
    </p>
    <a href="{% url 'login' %}" class="w-full sm:w-auto inline-flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
        Log back in
    </a>
</div>
{% endblock %}
