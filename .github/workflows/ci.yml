name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, feature/*]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ============================================================================
  # Linting and Code Quality (Ruff - 10-100x faster than flake8)
  # ============================================================================
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Ruff Linter
        uses: astral-sh/ruff-action@v3
        with:
          args: "check --output-format=github"
        continue-on-error: true

      - name: Run Ruff Formatter Check
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check --diff"
        continue-on-error: true

  # ============================================================================
  # Unit Tests with SQLite
  # ============================================================================
  test-sqlite:
    name: Unit Tests (SQLite)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        env:
          DJANGO_SETTINGS_MODULE: config.settings_test
        run: |
          python manage.py migrate --run-syncdb

      - name: Run tests with pytest
        env:
          DJANGO_SETTINGS_MODULE: config.settings_test
        run: |
          pytest --cov=. --cov-report=xml --cov-report=term-missing --junitxml=junit.xml -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-sqlite
          path: |
            junit.xml
            coverage.xml
            htmlcov/

  # ============================================================================
  # Integration Tests with PostgreSQL
  # ============================================================================
  test-postgres:
    name: Integration Tests (PostgreSQL)
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_carnitrack
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        env:
          DJANGO_SETTINGS_MODULE: config.settings_test
          USE_POSTGRES_FOR_TESTS: "true"
          TEST_DB_NAME: test_carnitrack
          TEST_DB_USER: postgres
          TEST_DB_PASSWORD: postgres
          TEST_DB_HOST: localhost
          TEST_DB_PORT: "5432"
        run: |
          python manage.py migrate --run-syncdb

      - name: Run tests with PostgreSQL
        env:
          DJANGO_SETTINGS_MODULE: config.settings_test
          USE_POSTGRES_FOR_TESTS: "true"
          TEST_DB_NAME: test_carnitrack
          TEST_DB_USER: postgres
          TEST_DB_PASSWORD: postgres
          TEST_DB_HOST: localhost
          TEST_DB_PORT: "5432"
        run: |
          pytest -m "integration or not slow" --cov=. --cov-report=xml --junitxml=junit.xml -v

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-postgres
          path: |
            junit.xml
            coverage.xml

  # ============================================================================
  # Security Scanning
  # ============================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety pip-audit

      - name: Run Bandit security linter
        run: bandit -r . -x ./tests,./htmlcov,./.tox,./staticfiles -ll
        continue-on-error: true

      - name: Check for known vulnerabilities with pip-audit
        run: |
          pip install -r requirements.txt
          pip-audit
        continue-on-error: true

  # ============================================================================
  # Build Check (Docker)
  # ============================================================================
  build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [test-sqlite, test-postgres]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: slaughterhouse-system:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # Summary Report
  # ============================================================================
  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test-sqlite, test-postgres, security]
    if: always()
    steps:
      - name: Download all test results
        uses: actions/download-artifact@v5
        with:
          pattern: test-results-*
          merge-multiple: true
        continue-on-error: true

      - name: Generate summary
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| SQLite Tests | ${{ needs.test-sqlite.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PostgreSQL Tests | ${{ needs.test-postgres.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
