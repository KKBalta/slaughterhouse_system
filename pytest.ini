[pytest]
# Django settings module (per pytest-django docs)
DJANGO_SETTINGS_MODULE = config.settings_test

# Test file discovery patterns
python_files = tests.py test_*.py tests_*.py *_test.py
python_classes = Test* *Tests
python_functions = test_*

# Command line options (per pytest-cov docs)
addopts = 
    --verbose
    --tb=short
    --strict-markers
    -ra
    --cov=.
    --cov-branch
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=60
    -n auto

# Test directories
testpaths = 
    core
    users
    reception
    processing
    inventory
    portal
    labeling
    reporting
    scales
    tests

# Custom markers (per pytest docs)
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    freeze_time: marks tests that use time freezing (pytest-freezegun)
    xdist_group: group tests to run on same worker (pytest-xdist)

# Warning filters
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Directories to skip
norecursedirs = 
    .git
    .tox
    .venv
    venv
    htmlcov
    staticfiles
    media
    theme
    locale
    migrations
    __pycache__
    *.egg-info

# Timeout for individual tests (requires pytest-timeout)
# timeout = 30

# Parallel testing options (pytest-xdist)
# Use --dist=loadfile to group tests by file for Django database isolation
# dist = loadfile
