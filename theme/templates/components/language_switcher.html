{% load i18n %}

<div class="relative inline-block text-left" id="language-switcher">
    <div>
        <button type="button" 
                class="inline-flex items-center justify-center w-full rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500" 
                id="language-menu-button" 
                aria-expanded="false" 
                aria-haspopup="true"
                onclick="toggleLanguageMenu()">
            {% get_current_language as LANGUAGE_CODE %}
            {% if LANGUAGE_CODE == 'tr' %}
                🇹🇷 TR
            {% elif LANGUAGE_CODE == 'en' %}
                🇺🇸 EN
            {% else %}
                {{ LANGUAGE_CODE|upper }}
            {% endif %}
            <svg class="-mr-1 ml-2 h-5 w-5 transition-transform duration-200" 
                 id="language-menu-arrow"
                 xmlns="http://www.w3.org/2000/svg" 
                 viewBox="0 0 20 20" 
                 fill="currentColor" 
                 aria-hidden="true">
                <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
            </svg>
        </button>
        
        <div class="hidden absolute right-0 z-50 mt-2 w-32 origin-top-right rounded-md bg-white shadow-lg ring-1 ring-black ring-opacity-5 focus:outline-none transform opacity-0 scale-95 transition-all duration-200 ease-out" 
             id="language-menu" 
             role="menu" 
             aria-orientation="vertical" 
             aria-labelledby="language-menu-button" 
             tabindex="-1">
            <div class="py-1" role="none">
                {% get_available_languages as LANGUAGES %}
                {% for lang_code, lang_name in LANGUAGES %}
                    <form action="{% url 'set_language' %}" method="post" class="inline-block w-full" onsubmit="console.log('Language form submitted:', this.language.value);">
                        {% csrf_token %}
                        <input name="next" type="hidden" value="{{ request.get_full_path }}" />
                        <input name="language" type="hidden" value="{{ lang_code }}" />
                        <button type="submit" 
                                class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 hover:text-gray-900 flex items-center transition-colors duration-150" 
                                role="menuitem"
                                onclick="console.log('Switching to language:', '{{ lang_code }}');">
                            {% if lang_code == 'tr' %}
                                🇹🇷 Türkçe
                            {% elif lang_code == 'en' %}
                                🇺🇸 English
                            {% else %}
                                {{ lang_name }}
                            {% endif %}
                            {% if LANGUAGE_CODE == lang_code %}
                                <svg class="ml-auto h-4 w-4 text-blue-600" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
                                </svg>
                            {% endif %}
                        </button>
                    </form>
                {% endfor %}
            </div>
        </div>
    </div>
</div>

<script>
function toggleLanguageMenu() {
    const menu = document.getElementById('language-menu');
    const button = document.getElementById('language-menu-button');
    const arrow = document.getElementById('language-menu-arrow');
    
    if (menu.classList.contains('hidden')) {
        // Show menu
        menu.classList.remove('hidden');
        setTimeout(() => {
            menu.classList.remove('opacity-0', 'scale-95');
            menu.classList.add('opacity-100', 'scale-100');
        }, 10);
        arrow.classList.add('rotate-180');
        button.setAttribute('aria-expanded', 'true');
    } else {
        // Hide menu
        menu.classList.remove('opacity-100', 'scale-100');
        menu.classList.add('opacity-0', 'scale-95');
        setTimeout(() => {
            menu.classList.add('hidden');
        }, 200);
        arrow.classList.remove('rotate-180');
        button.setAttribute('aria-expanded', 'false');
    }
}

// Close menu when clicking outside
document.addEventListener('click', function(event) {
    const switcher = document.getElementById('language-switcher');
    if (!switcher.contains(event.target)) {
        const menu = document.getElementById('language-menu');
        const button = document.getElementById('language-menu-button');
        const arrow = document.getElementById('language-menu-arrow');
        
        if (!menu.classList.contains('hidden')) {
            menu.classList.remove('opacity-100', 'scale-100');
            menu.classList.add('opacity-0', 'scale-95');
            setTimeout(() => {
                menu.classList.add('hidden');
            }, 200);
            arrow.classList.remove('rotate-180');
            button.setAttribute('aria-expanded', 'false');
        }
    }
});

// Close menu when pressing Escape
document.addEventListener('keydown', function(event) {
    if (event.key === 'Escape') {
        const menu = document.getElementById('language-menu');
        const button = document.getElementById('language-menu-button');
        const arrow = document.getElementById('language-menu-arrow');
        
        if (!menu.classList.contains('hidden')) {
            menu.classList.remove('opacity-100', 'scale-100');
            menu.classList.add('opacity-0', 'scale-95');
            setTimeout(() => {
                menu.classList.add('hidden');
            }, 200);
            arrow.classList.remove('rotate-180');
            button.setAttribute('aria-expanded', 'false');
            button.focus();
        }
    }
});
</script>
